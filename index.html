<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De-escalation Landscape Explorer | کاوشگر چشم‌انداز کاهش تنش</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================
   CSS VARIABLES & RESET
   ============================ */
:root {
  --bg: #0a0c10;
  --surface: #111318;
  --surface2: #181c24;
  --surface3: #1e2330;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.15);

  --text-primary: #e8eaf0;
  --text-secondary: #8a90a0;
  --text-muted: #4a5068;

  --accent-gold: #c9a84c;
  --accent-gold-light: #e8c96a;
  --accent-red: #e05252;
  --accent-green: #52c0a0;

  --domestic: #4a90d9;
  --international: #d9534a;
  --dual: #9b6cd9;

  --speed-fast: #52c0a0;
  --speed-medium: #c9a84c;
  --speed-slow: #8a90a0;

  --risk-low: #52c0a0;
  --risk-medium: #c9a84c;
  --risk-high: #e05252;

  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', sans-serif;
  --font-persian: 'Vazirmatn', 'DM Sans', sans-serif;

  --radius: 8px;
  --radius-lg: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 48px rgba(0,0,0,0.6);

  --sidebar-width: 260px;
  --drawer-height: 380px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
}

body[dir="rtl"] {
  font-family: var(--font-persian);
  direction: rtl;
}

/* ============================
   LAYOUT
   ============================ */
#app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ============================
   HEADER
   ============================ */
#header {
  background: linear-gradient(135deg, #0d1018 0%, #141822 50%, #0d1018 100%);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
}

.header-inner {
  max-width: 1600px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  gap: 16px;
}

.header-title {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.header-title h1 {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.02em;
  white-space: nowrap;
}

[dir="rtl"] .header-title h1 {
  font-family: var(--font-persian);
}

.header-subtitle {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.header-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.lang-toggle {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.lang-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  padding: 6px 12px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
  letter-spacing: 0.04em;
}

.lang-btn.active {
  background: var(--accent-gold);
  color: #0a0c10;
}

.iran-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
}

.iran-toggle:hover { border-color: var(--accent-gold); color: var(--accent-gold); }
.iran-toggle.active { background: rgba(201,168,76,0.15); border-color: var(--accent-gold); color: var(--accent-gold); }

.toggle-dot {
  width: 28px;
  height: 16px;
  background: var(--surface3);
  border-radius: 8px;
  position: relative;
  transition: background 0.2s;
  border: 1px solid var(--border-strong);
}

.toggle-dot::after {
  content: '';
  position: absolute;
  left: 2px;
  top: 50%;
  transform: translateY(-50%);
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: all 0.2s;
}

.iran-toggle.active .toggle-dot { background: rgba(201,168,76,0.3); }
.iran-toggle.active .toggle-dot::after { left: 14px; background: var(--accent-gold); }

/* ============================
   FEEDBACK LOOP BAR
   ============================ */
#loop-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  overflow: hidden;
}

.loop-bar-inner {
  max-width: 1600px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 0;
  padding: 12px 0;
  overflow-x: auto;
  scrollbar-width: none;
}

.loop-bar-inner::-webkit-scrollbar { display: none; }

.loop-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  white-space: nowrap;
  margin-right: 16px;
  flex-shrink: 0;
}

[dir="rtl"] .loop-label { margin-right: 0; margin-left: 16px; }

.loop-nodes {
  display: flex;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
}

.loop-node {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  position: relative;
}

.loop-node:hover { border-color: var(--accent-gold); color: var(--accent-gold); background: rgba(201,168,76,0.08); }
.loop-node.active { border-color: var(--accent-gold); color: var(--accent-gold); background: rgba(201,168,76,0.12); }

.loop-arrow {
  color: var(--text-muted);
  font-size: 14px;
  padding: 0 6px;
  user-select: none;
}

[dir="rtl"] .loop-arrow { transform: scaleX(-1); }

.loop-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* ============================
   MAIN CONTENT
   ============================ */
#main-content {
  display: flex;
  flex: 1;
  max-width: 1600px;
  margin: 0 auto;
  width: 100%;
}

/* ============================
   SIDEBAR FILTERS
   ============================ */
#sidebar {
  width: var(--sidebar-width);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 16px;
  overflow-y: auto;
  height: calc(100vh - 64px - 57px);
  position: sticky;
  top: calc(64px + 57px);
}

[dir="rtl"] #sidebar { border-right: none; border-left: 1px solid var(--border); }

.filter-section { margin-bottom: 24px; }

.filter-title {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
  font-weight: 600;
}

.filter-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text-secondary);
  user-select: none;
}

.chip:hover { border-color: var(--border-strong); color: var(--text-primary); }
.chip.active { border-color: currentColor; }
.chip.target-domestic { color: var(--domestic); }
.chip.target-domestic.active { background: rgba(74,144,217,0.15); }
.chip.target-international { color: var(--international); }
.chip.target-international.active { background: rgba(217,83,74,0.15); }
.chip.target-dual { color: var(--dual); }
.chip.target-dual.active { background: rgba(155,108,217,0.15); }
.chip.speed-fast { color: var(--speed-fast); }
.chip.speed-fast.active { background: rgba(82,192,160,0.15); }
.chip.speed-medium { color: var(--speed-medium); }
.chip.speed-medium.active { background: rgba(201,168,76,0.15); }
.chip.speed-slow { color: var(--speed-slow); }
.chip.speed-slow.active { background: rgba(138,144,160,0.15); }
.chip.active-actor { color: var(--accent-gold); }
.chip.active-actor.active { background: rgba(201,168,76,0.15); }

.risk-slider-wrap { padding: 4px 0; }
.risk-label-row {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: linear-gradient(to right, var(--risk-low) 0%, var(--risk-medium) 50%, var(--risk-high) 100%);
  border-radius: 2px;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--text-primary);
  cursor: pointer;
  border: 2px solid var(--bg);
  box-shadow: 0 0 0 2px var(--accent-gold);
}

.reset-btn {
  width: 100%;
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  padding: 8px;
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
  transition: all 0.2s;
  margin-top: 8px;
}

.reset-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }

/* ============================
   GRID AREA
   ============================ */
#grid-area {
  flex: 1;
  overflow: auto;
  padding: 20px;
  min-width: 0;
}

.grid-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}

.grid-stats {
  font-size: 12px;
  color: var(--text-muted);
}

.grid-stats span { color: var(--text-primary); font-weight: 600; }

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-secondary);
  white-space: nowrap;
}

.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* The Grid Table */
.grid-wrapper {
  overflow-x: auto;
}

table.action-grid {
  border-collapse: separate;
  border-spacing: 4px;
  min-width: 700px;
}

table.action-grid th {
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: center;
  white-space: nowrap;
}

table.action-grid th.row-header {
  text-align: left;
  background: none;
  color: var(--text-muted);
  min-width: 120px;
}

[dir="rtl"] table.action-grid th.row-header { text-align: right; }

table.action-grid td.actor-label {
  font-size: 11px;
  color: var(--text-secondary);
  padding: 6px 12px;
  white-space: nowrap;
  font-weight: 500;
  vertical-align: top;
  padding-top: 14px;
}

table.action-grid td.cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
  vertical-align: top;
  min-width: 140px;
  transition: background 0.2s;
}

table.action-grid td.cell:hover { background: var(--surface2); }
table.action-grid td.cell.empty { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.03); }

/* Action Node / Card */
.action-node {
  border-radius: 6px;
  padding: 8px 10px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 6px;
  position: relative;
  overflow: hidden;
}

.action-node:last-child { margin-bottom: 0; }

.action-node::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
}

.action-node.target-domestic { background: rgba(74,144,217,0.08); border: 1px solid rgba(74,144,217,0.2); }
.action-node.target-domestic::before { background: var(--domestic); }
.action-node.target-international { background: rgba(217,83,74,0.08); border: 1px solid rgba(217,83,74,0.2); }
.action-node.target-international::before { background: var(--international); }
.action-node.target-dual { background: rgba(155,108,217,0.08); border: 1px solid rgba(155,108,217,0.2); }
.action-node.target-dual::before { background: var(--dual); }

.action-node:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.action-node.selected { box-shadow: 0 0 0 2px var(--accent-gold), 0 4px 16px rgba(201,168,76,0.2); }
.action-node.iran-highlight { box-shadow: 0 0 0 1px var(--accent-gold); }
.action-node.iran-dim { opacity: 0.2; }

.node-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
  line-height: 1.3;
}

.node-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}

.badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.badge.speed-fast { background: rgba(82,192,160,0.2); color: var(--speed-fast); }
.badge.speed-medium { background: rgba(201,168,76,0.2); color: var(--speed-medium); }
.badge.speed-slow { background: rgba(138,144,160,0.15); color: var(--speed-slow); }
.badge.risk-1 { background: rgba(82,192,160,0.2); color: var(--risk-low); }
.badge.risk-2 { background: rgba(201,168,76,0.2); color: var(--risk-medium); }
.badge.risk-3 { background: rgba(224,82,82,0.2); color: var(--risk-high); }
.badge.iran { background: rgba(201,168,76,0.2); color: var(--accent-gold); }

/* ============================
   DETAIL DRAWER
   ============================ */
#drawer {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  height: var(--drawer-height);
  background: var(--surface);
  border-top: 1px solid var(--border-strong);
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
}

#drawer.open { transform: translateY(0); }

.drawer-handle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.drawer-handle-bar {
  width: 40px; height: 3px;
  background: var(--border-strong);
  border-radius: 2px;
  cursor: pointer;
  transition: background 0.2s;
}

.drawer-handle-bar:hover { background: var(--text-muted); }

.drawer-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  font-size: 18px;
  line-height: 1;
  transition: color 0.2s;
}

.drawer-close:hover { color: var(--text-primary); }

.drawer-content {
  flex: 1;
  overflow-y: auto;
  padding: 0 24px 24px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  padding-top: 16px;
}

@media (max-width: 900px) {
  .drawer-content { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 600px) {
  .drawer-content { grid-template-columns: 1fr; }
  #drawer { height: 70vh; }
  var(--drawer-height): 70vh;
}

.drawer-section h3 {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
  font-weight: 600;
}

.drawer-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
  margin-bottom: 4px;
}

[dir="rtl"] .drawer-title { font-family: var(--font-persian); }

.drawer-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.drawer-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.iran-note {
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: var(--radius);
  padding: 10px 12px;
  font-size: 12px;
  color: var(--accent-gold-light);
  line-height: 1.5;
}

/* Radar / Trade-offs */
.tradeoff-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.tradeoff-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.tradeoff-label {
  width: 110px;
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}

.tradeoff-bar {
  flex: 1;
  height: 6px;
  background: var(--surface3);
  border-radius: 3px;
  overflow: hidden;
}

.tradeoff-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.tradeoff-fill.gold { background: var(--accent-gold); }
.tradeoff-fill.blue { background: var(--domestic); }
.tradeoff-fill.red { background: var(--international); }
.tradeoff-fill.green { background: var(--accent-green); }
.tradeoff-fill.purple { background: var(--dual); }

.tradeoff-val {
  width: 20px;
  font-size: 11px;
  color: var(--text-secondary);
  text-align: right;
}

[dir="rtl"] .tradeoff-val { text-align: left; }

/* ============================
   TOOLTIP
   ============================ */
#tooltip {
  position: fixed;
  background: var(--surface2);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 12px;
  max-width: 220px;
  pointer-events: none;
  z-index: 300;
  box-shadow: var(--shadow);
  opacity: 0;
  transition: opacity 0.15s;
}

#tooltip.visible { opacity: 1; }

.tooltip-title {
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
  font-size: 13px;
}

.tooltip-desc {
  color: var(--text-secondary);
  margin-bottom: 6px;
  line-height: 1.4;
}

.tooltip-iran {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--accent-gold);
}

/* ============================
   EMPTY STATE
   ============================ */
.empty-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 11px;
  padding: 8px;
  opacity: 0.4;
  font-style: italic;
}

/* ============================
   SCROLLBAR
   ============================ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* ============================
   RESPONSIVE
   ============================ */
@media (max-width: 768px) {
  #sidebar { display: none; }
  #sidebar.mobile-open {
    display: block;
    position: fixed;
    top: 0; left: 0;
    width: 280px;
    height: 100vh;
    z-index: 150;
    top: 0;
  }
  [dir="rtl"] #sidebar.mobile-open { left: auto; right: 0; }
  .header-title h1 { font-size: 14px; }
  .header-subtitle { display: none; }
  .iran-toggle span.label { display: none; }
}

/* ============================
   ANIMATIONS
   ============================ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.action-node {
  animation: fadeIn 0.25s ease both;
}

/* Mobile filter btn */
.mobile-filter-btn {
  display: none;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
}

@media (max-width: 768px) { .mobile-filter-btn { display: flex; align-items: center; gap: 6px; } }

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 140;
  backdrop-filter: blur(4px);
}
.overlay.active { display: block; }
</style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div class="header-inner">
      <div class="header-title">
        <h1 id="main-title">De-escalation Landscape Explorer</h1>

const ACTORS = ['individual','organization','state','international','private'];
const METHODS = ['diplomatic','mitigation','civic','economic','technological'];

const LOOP_STAGE_ACTIONS = {
  polarization: ['dialogue_circles','media_literacy','digital_activism','education_reform','algorithmic_trust','citizen_participation','women_peacebuilding'],
  governance: ['education_reform','peace_infrastructure','confidence_building','reverse_sanctions','threat_resilience'],
  external: ['sanctions','reverse_sanctions','nuclear_diplomacy','track2_diplomacy','un_resolutions','confidence_building'],

};

// ============================
// LANG & IRAN HELPERS
// ============================
function t(key, ...args) {
  const entry = T[state.lang][key];
  return typeof entry === 'function' ? entry(...args) : entry;
}

function actionTitle(a) { return state.lang === 'fa' ? a.title_fa : a.title_en; }
function actionDesc(a) { return state.lang === 'fa' ? a.description_fa : a.description_en; }
function actionIranNote(a) { return state.lang === 'fa' ? a.iran_notes_fa : a.iran_notes_en; }

function actorLabel(a) {
  const map = { individual: 'actorIndividual', organization: 'actorOrg', state: 'actorState', international: 'actorIntl', private: 'actorPrivate' };
  return t(map[a]);
}

function methodLabel(m) {
  const map = { diplomatic: 'methodDiplom', mitigation: 'methodMitigation', civic: 'methodCivic', economic: 'methodEcon', technological: 'methodTech' };
  return t(map[m]);
}

function speedLabel(s) {
  return t({ fast: 'speedFast', medium: 'speedMedium', slow: 'speedSlow' }[s]);
}

function riskLabel(r) {
  return t({ 1: 'riskLow1', 2: 'riskMed2', 3: 'riskHigh3' }[r]);
}

// ============================
// FILTER LOGIC
// ============================
function filteredActions() {
  return ACTIONS.filter(a => {
    if (!state.filters.target.includes(a.target)) return false;
    if (!state.filters.speed.includes(a.speed)) return false;
    if (a.risk > state.filters.maxRisk) return false;
    if (!state.filters.actor.includes(a.actor)) return false;
    if (state.filters.loopStage) {
      const relevant = LOOP_STAGE_ACTIONS[state.filters.loopStage] || [];
      if (!relevant.includes(a.id)) return false;
    }
    return true;
  });
}

// ============================
// RENDER GRID
// ============================
function renderGrid() {
  const visible = filteredActions();
  const allIds = new Set(visible.map(a => a.id));

  // Stats
  document.getElementById('grid-stats').innerHTML = t('gridStats', visible.length, ACTIONS.length);

  // Legend
  const leg = document.getElementById('legend');
  leg.innerHTML = `
    <div class="legend-item"><div class="legend-dot" style="background:var(--domestic)"></div>${t('legendDomestic')}</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--international)"></div>${t('legendIntl')}</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--dual)"></div>${t('legendDual')}</div>
  `;

  const table = document.getElementById('action-grid');
  let html = '<thead><tr><th class="row-header"></th>';
  METHODS.forEach(m => { html += `<th>${methodLabel(m)}</th>`; });
  html += '</tr></thead><tbody>';

  ACTORS.forEach(actor => {
    html += `<tr><td class="actor-label">${actorLabel(actor)}</td>`;
    METHODS.forEach(method => {
      const cells = ACTIONS.filter(a => a.actor === actor && a.method === method);
      if (cells.length === 0) {
        html += `<td class="cell empty"><div class="empty-cell">${t('emptyCell')}</div></td>`;
        return;
      }
      html += `<td class="cell">`;
      cells.forEach((a, i) => {
        const isVisible = allIds.has(a.id);
        const iranClass = state.iranMode
          ? (a.iran_relevance >= 4 ? 'iran-highlight' : 'iran-dim')
          : '';
        const selectedClass = state.selectedAction === a.id ? 'selected' : '';
        const dimClass = !isVisible ? 'iran-dim' : '';
        const speedBadge = `<span class="badge speed-${a.speed}">${speedLabel(a.speed)}</span>`;
        const riskBadge = `<span class="badge risk-${a.risk}">${riskLabel(a.risk)}</span>`;
        const iranBadge = (state.iranMode && a.iran_relevance >= 4)
          ? `<span class="badge iran">Iran</span>` : '';
        html += `<div 
          class="action-node target-${a.target} ${iranClass} ${selectedClass} ${dimClass}"
          onclick="selectAction('${a.id}')"
          onmouseenter="showTooltip(event,'${a.id}')"
          onmouseleave="hideTooltip()"
          style="animation-delay:${i * 40}ms"
        >
          <div class="node-title">${actionTitle(a)}</div>
          <div class="node-badges">${speedBadge}${riskBadge}${iranBadge}</div>
        </div>`;
      });
      html += `</td>`;
    });
    html += '</tr>';
  });

  html += '</tbody>';
  table.innerHTML = html;
}

// ============================
// RENDER FILTERS
// ============================
function renderFilters() {
  // Target chips
  const targetEl = document.getElementById('filter-target');
  targetEl.innerHTML = ['domestic','international','dual'].map(v => {
    const active = state.filters.target.includes(v) ? 'active' : '';
    const label = t({ domestic: 'legendDomestic', international: 'legendIntl', dual: 'legendDual' }[v]);
    return `<div class="chip target-${v} ${active}" onclick="toggleFilter('target','${v}')">${label}</div>`;
  }).join('');

  // Speed chips
  const speedEl = document.getElementById('filter-speed');
  speedEl.innerHTML = ['fast','medium','slow'].map(v => {
    const active = state.filters.speed.includes(v) ? 'active' : '';
    return `<div class="chip speed-${v} ${active}" onclick="toggleFilter('speed','${v}')">${speedLabel(v)}</div>`;
  }).join('');

  // Actor chips
  const actorEl = document.getElementById('filter-actor');
  actorEl.innerHTML = ACTORS.map(v => {
    const active = state.filters.actor.includes(v) ? 'active' : '';
    return `<div class="chip active-actor ${active}" onclick="toggleFilter('actor','${v}')">${actorLabel(v)}</div>`;
  }).join('');

  document.getElementById('risk-slider').value = state.filters.maxRisk;
  document.getElementById('filter-target-label').textContent = t('filterTarget');
  document.getElementById('filter-speed-label').textContent = t('filterSpeed');
  document.getElementById('filter-risk-label').textContent = t('filterRisk');
  document.getElementById('filter-actor-label').textContent = t('filterActor');
  document.getElementById('risk-low-label').textContent = t('riskLow');
  document.getElementById('risk-high-label').textContent = t('riskHigh');
  document.getElementById('reset-btn').textContent = t('resetBtn');
  document.getElementById('filter-btn-label').textContent = t('filterBtnLabel');
}

// ============================
// RENDER LOOP BAR
// ============================
function renderLoopBar() {
  document.getElementById('loop-bar-label').textContent = t('loopBarLabel');
  const loopNodes = t('loopNodes');
  const el = document.getElementById('loop-nodes');
  let html = '';
  loopNodes.forEach((node, i) => {
    const active = state.filters.loopStage === node.id ? 'active' : '';
    html += `<div class="loop-node ${active}" onclick="toggleLoopStage('${node.id}')" title="${node.tooltip}">
      <div class="loop-dot"></div>
      ${node.label}
    </div>`;
    if (i < loopNodes.length - 1) html += `<div class="loop-arrow">→</div>`;
  });
  html += `<div class="loop-arrow" style="color:var(--accent-gold)">↺</div>`;
  el.innerHTML = html;
}

// ============================
// DRAWER
// ============================
function selectAction(id) {
  state.selectedAction = state.selectedAction === id ? null : id;
  if (state.selectedAction) openDrawer(id);
  else closeDrawer();
  renderGrid();
}

function openDrawer(id) {
  const a = ACTIONS.find(x => x.id === id);
  if (!a) return;

  const bars = [
    { label: t('drawerSpeed'), val: a.speed === 'fast' ? 5 : a.speed === 'medium' ? 3 : 1, max: 5, cls: 'green' },
    { label: t('drawerRisk'), val: a.risk, max: 3, cls: 'red' },
    { label: t('drawerScalability'), val: a.scalability, max: 5, cls: 'blue' },
    { label: t('drawerReversibility'), val: a.reversibility, max: 5, cls: 'gold' },
    { label: t('drawerResources'), val: 6 - a.resources, max: 5, cls: 'purple' },
    { label: t('drawerCultural'), val: a.cultural_adaptability, max: 5, cls: 'green' }
  ];

  const iranRelevanceBadge = a.iran_relevance >= 4
    ? `<span class="badge iran">${a.iran_relevance === 5 ? t('iranHighBadge') : t('iranBadge')}</span>`
    : '';

  const targetColor = { domestic: 'var(--domestic)', international: 'var(--international)', dual: 'var(--dual)' }[a.target];
  const targetName = t({ domestic: 'legendDomestic', international: 'legendIntl', dual: 'legendDual' }[a.target]);

  document.getElementById('drawer-content').innerHTML = `
    <div class="drawer-section">
      <div class="drawer-title">${actionTitle(a)}</div>
      <div class="drawer-meta">
        <span class="badge" style="background:rgba(255,255,255,0.08);color:var(--text-secondary)">${actorLabel(a.actor)}</span>
        <span class="badge" style="background:rgba(255,255,255,0.08);color:var(--text-secondary)">${methodLabel(a.method)}</span>
        <span class="badge" style="background:${targetColor}22;color:${targetColor}">${targetName}</span>
        <span class="badge speed-${a.speed}">${speedLabel(a.speed)}</span>
        <span class="badge risk-${a.risk}">${riskLabel(a.risk)}</span>
        ${iranRelevanceBadge}
      </div>
    </div>
    <div class="drawer-section">
      <h3>${t('drawerDesc')}</h3>
      <div class="drawer-desc">${actionDesc(a)}</div>
      ${state.iranMode || a.iran_relevance >= 4 ? `
        <div style="margin-top:10px">
          <h3>${t('drawerIran')}</h3>
          <div class="iran-note">${actionIranNote(a)}</div>
        </div>
      ` : ''}
    </div>
    <div class="drawer-section">
      <h3>${t('drawerTradeoffs')}</h3>
      <div class="tradeoff-grid">
        ${bars.map(b => `
          <div class="tradeoff-row">
            <div class="tradeoff-label">${b.label}</div>
            <div class="tradeoff-bar">
              <div class="tradeoff-fill ${b.cls}" style="width:${(b.val/b.max)*100}%"></div>
            </div>
            <div class="tradeoff-val">${b.val}/${b.max}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  state.selectedAction = null;
  renderGrid();
}

function showTooltip(e, id) {
  const a = ACTIONS.find(x => x.id === id);
  if (!a) return;
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-title').textContent = actionTitle(a);
  document.getElementById('tt-desc').textContent = actionDesc(a).substring(0, 100) + '…';
  const iranEl = document.getElementById('tt-iran');
  if (a.iran_relevance >= 4) {
    iranEl.innerHTML = `⬥ ${t('iranBadge')}`;
    iranEl.style.display = 'flex';
  } else {
    iranEl.style.display = 'none';
  }
  positionTooltip(e);
  tt.classList.add('visible');
}

function positionTooltip(e) {
  const tt = document.getElementById('tooltip');
  const x = e.clientX + 14;
  const y = e.clientY - 10;
  const maxX = window.innerWidth - 240;
  const maxY = window.innerHeight - 120;
  tt.style.left = Math.min(x, maxX) + 'px';
  tt.style.top = Math.min(y, maxY) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

// ============================
// FILTER CONTROLS
// ============================
function toggleFilter(type, value) {
  const arr = state.filters[type];
  const idx = arr.indexOf(value);
  if (idx === -1) arr.push(value);
  else if (arr.length > 1) arr.splice(idx, 1);
  applyFilters();
}

function applyFilters() {
  state.filters.maxRisk = parseInt(document.getElementById('risk-slider').value);
  renderFilters();
  renderGrid();
}

function resetFilters() {
  state.filters = {
    target: ['domestic', 'international', 'dual'],
    speed: ['fast', 'medium', 'slow'],
    maxRisk: 3,
    actor: ['individual', 'organization', 'state', 'international', 'private'],
    loopStage: null
  };
  renderFilters();
  renderLoopBar();
  renderGrid();
}

function toggleLoopStage(id) {
  state.filters.loopStage = state.filters.loopStage === id ? null : id;
  renderLoopBar();
  renderGrid();
}

// ============================
// LANGUAGE
// ============================
function setLang(lang) {
  state.lang = lang;
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'fa' ? 'rtl' : 'ltr';
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-fa').classList.toggle('active', lang === 'fa');
  renderAll();
}

// ============================
// IRAN MODE
// ============================
function toggleIranMode() {
  state.iranMode = !state.iranMode;
  document.getElementById('iran-toggle-btn').classList.toggle('active', state.iranMode);
  renderGrid();
}

// ============================
// MOBILE SIDEBAR
// ============================
function toggleMobileSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  sidebar.classList.toggle('mobile-open');
  overlay.classList.toggle('active');
}

// ============================
// RENDER ALL
// ============================
function renderAll() {
  renderHeaderText();
  renderLoopBar();
  renderFilters();
  renderGrid();
}

// ============================
// INIT
// ============================
renderAll();
</script>
</body>
</html>
