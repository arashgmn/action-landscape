<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Action Landscape Explorer | Ъ©Ш§ЩҲШҙЪҜШұ ЪҶШҙЩ…вҖҢШ§ЩҶШҜШ§ШІ Ъ©ЩҶШҙ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ======================================================
   THEME VARIABLES вҖ” dark (default) and light
   ====================================================== */
:root {
  --bg:            #0a0c10;
  --surface:       #111318;
  --surface2:      #181c24;
  --surface3:      #1e2330;
  --border:        rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.15);
  --text-primary:  #e8eaf0;
  --text-secondary:#8a90a0;
  --text-muted:    #4a5068;
  --shadow:        0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:     0 8px 48px rgba(0,0,0,0.6);
  --scrollbar-bg:  #111318;
  --scrollbar-thumb: #1e2330;

  /* target colours */
  --domestic:      rgb(105, 221, 149);
  --international: rgb(149, 105, 221); 
  --dual:          rgb(221, 150, 105);
  --crisis:        rgb(255, 255, 255);
  

  /* speed вҖ” cool teal вҶ’ slate blue family */
  --speed-fast:    rgb(14, 88, 185); /* #2ec4b6; */
  --speed-medium:  rgb(73, 154, 226); /* #5b8dee; */
  --speed-slow:    rgb(158, 208, 237); /* #7a8fa8; */

  /* risk вҖ” warm amber вҶ’ crimson family */
  --risk-low:      #00aa52;
  --risk-medium:   #f0a500;
  --risk-high:     #d20916;

  /* iran highlight вҖ” teal/cyan accent */
  --iran-accent:   #0a81ac; 
  --iran-bg:       rgba(10, 129, 172, .10); 
  --iran-border:   rgba(10, 129, 172, .8); 
  --iran-glow:     0 0 0 3px rgba(10, 129, 172, .35); 
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'DM Sans', sans-serif;
  --font-persian: 'Vazirmatn', sans-serif;
  --radius:       8px;
  --sidebar-width:300px;
  --drawer-height:400px;
}

/* LIGHT THEME */
body.light {
  --bg:            #f0f2f7;
  --surface:       #ffffff;
  --surface2:      #e8ecf4;
  --surface3:      #dde2ef;
  --border:        rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.18);
  --text-primary:  #1a1d26;
  --text-secondary:#4a5270;
  --text-muted:    #8892aa;
  --shadow:        0 4px 24px rgba(0,0,0,0.10);
  --shadow-lg:     0 8px 48px rgba(0,0,0,0.14);
  --scrollbar-bg:  #e8ecf4;
  --scrollbar-thumb: #c8cedf;

  --domestic:      rgb(62, 170, 103);
  --international: rgb(103, 53, 183); 
  --dual:          rgb(163, 87, 39);
  --crisis:        rgb(0,0,0);
  /* --speed-fast:    #0d9488;
  --speed-medium:  #3b5fd4;
  --speed-slow:    #5a7080; */
  --speed-fast:    rgb(5, 39, 83); /* #2ec4b6; */
  --speed-medium:  rgb(34, 97, 153); /* #5b8dee; */
  --speed-slow:    rgb(98, 152, 182); /* #7a8fa8; */
  --risk-low:      #1a9e5a;
  --risk-medium:   #c07800;
  --risk-high:     #c0252e;
  /* --iran-accent:   #007a6e;
  --iran-bg:       rgba(0,122,110,0.08);
  --iran-border:   rgba(0,122,110,0.45);
  --iran-glow:     0 0 0 2px rgba(0,122,110,0.28); */
  --iran-accent:   #076485; 
  --iran-bg:       rgba(7, 100, 133, .30); 
  --iran-border:   rgba(7, 100, 133, .8);
  --iran-glow:     0 0 0 3px rgba(7, 100, 133, .35); //rgba(0,201,177,0.35);

}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
  transition: background 0.25s, color 0.25s;
}
body[dir="rtl"] { font-family: var(--font-persian); }

/* ======================================================
   SCROLLBAR
   ====================================================== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--scrollbar-bg); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

/* ======================================================
   HEADER
   ====================================================== */
#header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  position: sticky; top: 0; z-index: 100;
}
.header-inner {
  max-width: inherit; margin: 0 auto;
  display: flex; align-items: center;
  justify-content: space-between;
  height: 60px; gap: 12px;
}
.header-title { display: flex; flex-direction: column; gap: 1px; }
.header-title h1 {
  font-family: var(--font-display);
  font-size: 17px; font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.01em; white-space: nowrap;
}
[dir="rtl"] .header-title h1 { font-family: var(--font-persian); }
.header-subtitle {
  font-size: 10px; color: var(--text-muted);
  letter-spacing: 0.09em; text-transform: uppercase;
}
.header-controls { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; }

/* tab strip in header */
.nav-tabs {
  display: flex; gap: 2px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px; overflow: hidden;
}
.nav-tab {
  background: none; border: none;
  color: var(--text-muted);
  padding: 5px 12px; cursor: pointer;
  font-size: 11px; font-weight: 600;
  font-family: inherit;
  transition: all 0.15s;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.nav-tab:hover { color: var(--text-primary); background: var(--surface3); }
.nav-tab.active { background: var(--surface3); color: var(--text-primary); }

.lang-toggle {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px; overflow: hidden;
}
.lang-btn {
  background: none; border: none;
  color: var(--text-secondary);
  padding: 5px 10px; cursor: pointer;
  font-size: 11px; font-weight: 600;
  font-family: inherit;
  transition: all 0.2s; letter-spacing: 0.04em;
}
.lang-btn.active { background: var(--text-primary); color: var(--bg); }

#btn-fa {
  font-family: var(--font-persian), sans-serif;
}

/* theme toggle */
.theme-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 9px;
  cursor: pointer;
  font-size: 14px; line-height: 1;
  transition: all 0.2s;
  color: var(--text-secondary);
}
.theme-btn:hover { border-color: var(--border-strong); align-items: center;}

/* iran context toggle */
.iran-toggle {
  display: flex; align-items: center; gap: 7px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  cursor: pointer;
  font-size: 11px; font-weight: 600;
  font-family: inherit;
  color: var(--text-secondary);
  transition: all 0.2s; white-space: nowrap;
}
.iran-toggle:hover { border-color: var(--iran-border); color: var(--iran-accent); }
.iran-toggle.active {
  background: var(--iran-bg);
  border-color: var(--iran-border);
  color: var(--iran-accent);
}
.toggle-track {
  width: 26px; height: 14px;
  background: var(--surface3);
  border-radius: 7px;
  position: relative; transition: background 0.2s;
  border: 1px solid var(--border-strong);
  flex-shrink: 0;
}
.toggle-track::after {
  content: '';
  position: absolute; left: 2px; top: 50%;
  transform: translateY(-50%);
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: all 0.2s;
}
.iran-toggle.active .toggle-track { background: var(--iran-bg); border-color: var(--iran-border); }
.iran-toggle.active .toggle-track::after { left: 14px; background: var(--iran-accent); }

/* ======================================================
   PAGES
   ====================================================== */
.page { display: none; }
.page.active { display: flex; flex-direction: column; flex: 1; }
#page-explorer { flex-direction: row; min-height: calc(100vh - 60px - 53px); }

/* ======================================================
   METHODOLOGY PAGE
   ====================================================== */
#page-methodology {
  max-width: 900px; margin: 0 auto;
  padding: 40px 24px 80px;
  flex-direction: column;
}
.method-section {
  margin-bottom: 40px;
}
.method-section h2 {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
[dir="rtl"] .method-section h2 { font-family: var(--font-persian); }
.method-section h3 {
  font-size: 13px; font-weight: 600;
  color: var(--text-primary); margin: 20px 0 6px;
}
.method-section p {
  font-size: 13px; color: var(--text-secondary);
  line-height: 1.75; margin-bottom: 10px;
}
.method-section a {
  color: var(--domestic); text-decoration: none;
}
.method-section a:hover { text-decoration: underline; }

/* rubric table */
.rubric-table {
  width: 100%; border-collapse: collapse;
  font-size: 12px; margin-top: 10px;
}
.rubric-table th {
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 12px; text-align: left;
  border-bottom: 1px solid var(--border);
}
[dir="rtl"] .rubric-table th { text-align: right; }
.rubric-table td {
  padding: 9px 12px; vertical-align: top;
  border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
  line-height: 1.5;
}
.rubric-table tr:last-child td { border-bottom: none; }
.rubric-table td:first-child { font-weight: 600; color: var(--text-primary); width: 140px; }
.rubric-table td code {
  font-size: 11px; background: var(--surface2);
  padding: 1px 5px; border-radius: 3px;
  font-family: monospace; color: var(--text-primary);
}

/* axis box */
.axis-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 14px; margin-top: 12px;
}
@media (max-width: 640px) { .axis-grid { grid-template-columns: 1fr; } }
.axis-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
}
.axis-card h4 {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 8px;
}
.axis-card ul { list-style: none; }
.axis-card ul li {
  font-size: 12px; color: var(--text-secondary);
  padding: 3px 0;
  border-bottom: 1px solid var(--border);
}
.axis-card ul li:last-child { border-bottom: none; }
.axis-card ul li span {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; margin-right: 7px;
  vertical-align: middle;
}
[dir="rtl"] .axis-card ul li span { margin-right: 0; margin-left: 7px; }

.source-list { list-style: none; }
.source-list li {
  font-size: 12px; color: var(--text-secondary);
  padding: 6px 0; border-bottom: 1px solid var(--border);
  display: flex; gap: 10px; align-items: baseline;
}
.source-list li:last-child { border-bottom: none; }
.source-list li a { color: var(--domestic); }
.source-num {
  font-size: 10px; background: var(--surface2);
  padding: 1px 6px; border-radius: 3px;
  color: var(--text-muted); font-weight: 700;
  flex-shrink: 0;
}

/* ======================================================
   FEEDBACK LOOP BAR
   ====================================================== */
#loop-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.loop-bar-inner {
  max-width: 1600px; margin: 0 auto;
  display: flex; align-items: center;
  padding: 10px 0; overflow-x: auto;
  scrollbar-width: none;
}
.loop-bar-inner::-webkit-scrollbar { display: none; }
.loop-label {
  font-size: 9px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-muted);
  white-space: nowrap; margin-right: 14px; flex-shrink: 0;
}
[dir="rtl"] .loop-label { margin-right: 0; margin-left: 14px; }
.loop-nodes { display: flex; align-items: center; flex-shrink: 0; }
.loop-node {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 12px;
  cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
  font-size: 11px; font-weight: 500;
  color: var(--text-secondary);
}
.loop-node:hover,
.loop-node.active {
  border-color: var(--crisis); color: var(--crisis);
  background: rgba(155,108,217,0.08);
}
body.light .loop-node:hover,
body.light .loop-node.active {
  border-color: var(--crisis); color: var(--crisis);
  background: rgba(123,76,176,0.07);
}
.loop-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.loop-arrow { color: var(--text-muted); font-size: 13px; padding: 0 5px; user-select: none; }
[dir="rtl"] .loop-arrow { transform: scaleX(-1); }

/* ======================================================
   SIDEBAR
   ====================================================== */
#sidebar {
  width: var(--sidebar-width); flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 18px 14px;
  overflow-y: auto;
  height: calc(100vh - 60px - 53px);
  position: sticky; top: calc(60px + 53px);
}
[dir="rtl"] #sidebar { border-right: none; border-left: 1px solid var(--border); }

.filter-section { margin-bottom: 22px; }
.filter-title {
  font-size: 9px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 9px; font-weight: 700;
}
.filter-chips { display: flex; flex-wrap: wrap; gap: 5px; }

.chip {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 4px; padding: 3px 9px;
  font-size: 11px; cursor: pointer;
  transition: all 0.15s;
  color: var(--text-muted);
  font-family: inherit;
  user-select: none;
}
.chip:hover { color: var(--text-primary); border-color: var(--border-strong); }
/* active = coloured */
.chip.active { opacity: 1; }
.chip:not(.active) { opacity: 0.3; }

.chip.target-domestic  { color: var(--domestic); border-color: var(--domestic); }
.chip.target-international { color: var(--international); border-color: var(--international); }
.chip.target-dual      { color: var(--dual); border-color: var(--dual); }
.chip.target-domestic.active  { background: var(--domestic) opacity=.33; }
.chip.target-international.active { background: var(--international) opacity=.33; }
.chip.target-dual.active { background: var(--dual) opacity=.33;}

.chip.speed-fast   { color: var(--speed-fast);   border-color: var(--speed-fast); }
.chip.speed-medium { color: var(--speed-medium); border-color: var(--speed-medium); }
.chip.speed-slow   { color: var(--speed-slow);   border-color: var(--speed-slow); }
.chip.speed-fast.active   { background: var(--speed-fast) opacity=.33; }
.chip.speed-medium.active { background: var(--speed-medium) opacity=.33;}
.chip.speed-slow.active   { background: var(--speed-slow) opacity=.33;}

.chip.risk-1 { color: var(--risk-low);    border-color: var(--risk-low); }
.chip.risk-2 { color: var(--risk-medium); border-color: var(--risk-medium); }
.chip.risk-3 { color: var(--risk-high);   border-color: var(--risk-high); }
.chip.risk-1.active { background: var(--risk-low) opacity: .33; }
.chip.risk-2.active { background: var(--risk-medium) opacity: .33; }
.chip.risk-3.active { background: var(--risk-high) opacity: .33; }

.chip.actor-chip { color: var(--text-secondary); border-color: var(--border-strong); }
.chip.actor-chip.active { color: var(--text-primary); background: var(--surface3); border-color: var(--border-strong); opacity: 1; }

.risk-slider-wrap { padding: 4px 0 2px; }
.risk-label-row {
  display: flex; justify-content: space-between;
  font-size: 10px; color: var(--text-muted); margin-bottom: 6px;
}
input[type="range"] {
  -webkit-appearance: none; width: 100%; height: 4px;
  background: linear-gradient(to right, var(--risk-low), var(--risk-medium), var(--risk-high));
  border-radius: 2px; outline: none; cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--text-primary); cursor: pointer;
  border: 2px solid var(--bg);
  box-shadow: 0 0 0 2px var(--risk-medium);
}
.risk-current {
  font-size: 11px; color: var(--text-secondary);
  margin-top: 4px; text-align: center;
}

.reset-btn {
  width: 100%; background: none;
  border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-muted);
  padding: 7px; cursor: pointer;
  font-size: 11px; font-family: inherit;
  transition: all 0.2s; margin-top: 6px;
}
.reset-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }

/* ======================================================
   GRID AREA
   ====================================================== */
#grid-area { flex: 1; overflow: auto; padding: 18px; min-width: 0; }
.grid-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
}
.grid-stats { font-size: 12px; color: var(--text-muted); }
.grid-stats strong { color: var(--text-primary); }
.legend { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--text-secondary); white-space: nowrap;
}
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

.grid-wrapper { overflow-x: auto; }
table.action-grid {
  border-collapse: separate; 
  border-spacing: 4px; 
  /* min-width: 680px; */
  width:-moz-available;
}
table.action-grid th {
  padding: 7px 10px; font-size: 10px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-muted); text-align: center; white-space: nowrap;
}
table.action-grid th.row-header {
  text-align: left; min-width: 110px;
}
[dir="rtl"] table.action-grid th.row-header { text-align: right; }
table.action-grid td.actor-label {
  font-size: 11px; color: var(--text-secondary);
  padding: 6px 10px; white-space: nowrap;
  font-weight: 600; vertical-align: top; padding-top: 13px;
}
table.action-grid td.cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius); padding: 7px;
  vertical-align: top; min-width: 136px; transition: background 0.2s;
}
table.action-grid td.cell:hover { background: var(--surface2); }
table.action-grid td.cell.empty {
  background: rgba(128,128,128,0.03);
  border-color: rgba(128,128,128,0.05);
}

/* ======================================================
   ACTION NODES
   ====================================================== */
.action-node {
  border-radius: 6px; padding: 7px 9px;
  cursor: pointer; transition: opacity 0.2s, box-shadow 0.2s, transform 0.15s;
  margin-bottom: 5px; position: relative; overflow: hidden;
}
.action-node:last-child { margin-bottom: 0; }
.action-node::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
}

/* target colour */
.action-node.target-domestic  { background: rgba(105, 221, 149, 0.08); border: 1px solid rgba(105, 221, 149, 0.22); }
.action-node.target-domestic::before  { background: var(--domestic); }
.action-node.target-international { background: rgba(149, 105, 221, 0.08); border: 1px solid rgba(149, 105, 221, 0.22); }
.action-node.target-international::before { background: var(--international); }
.action-node.target-dual  { background: rgba(221, 150, 105, 0.08); border: 1px solid rgba(221, 150, 105, 0.22); }
.action-node.target-dual::before  { background: var(--dual); }

/* light-mode adjustments */
body.light .action-node.target-domestic  { background: rgba(62, 170, 103, 0.06);  border-color: rgba(62, 170, 103, 0.25); }
body.light .action-node.target-international { background: rgba(103, 53, 183, 0.06); border-color: rgba(103, 53, 183, 0.25); }
body.light .action-node.target-dual  { background: rgba(163, 87, 39, 0.06); border-color: rgba(163, 87, 39, 0.25); }

.action-node:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.25); }
body.light .action-node:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.10); }

.action-node.selected {
  box-shadow: 0 0 0 2px var(--text-primary);
}

/* IRAN HIGHLIGHT */
.action-node.iran-highlight {
  /* background: var(--iran-bg) !important;
  border-color: var(--iran-border) !important; */
  box-shadow: var(--iran-glow) !important;
}
/* .action-node.iran-highlight::before { background: var(--iran-accent) !important; } */

/* FILTERED-OUT nodes just fade */
.action-node.filtered-out { 
  filter: opacity(0.18); 
  pointer-events: none; 
}

.node-title {
  font-size: 11px; font-weight: 600;
  color: var(--text-primary); margin-bottom: 4px; line-height: 1.3;
}
.node-badges { display: flex; flex-wrap: wrap; gap: 3px; }

.badge {
  font-size: 9px; padding: 1px 5px;
  border-radius: 3px; font-weight: 700;

.badge.sp-slow   { background: rgba(158, 208, 237, .18); color: var(--speed-slow); }

.badge.rk-1 { background: rgba(52,199,123,0.18); color: var(--risk-low); }
.badge.rk-2 { background: rgba(240,165,0,0.18);  color: var(--risk-medium); }
.badge.rk-3 { background: rgba(232,64,74,0.18);  color: var(--risk-high); }

   ====================================================== */
#drawer {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--drawer-height);
  background: var(--surface);
  border-top: 2px solid var(--border-strong);
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.35);
}
#drawer.open { transform: translateY(0); }

.drawer-handle {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 10px 20px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.drawer-bar {
  width: 36px; height: 3px;
  background: var(--border-strong); border-radius: 2px;
  cursor: pointer;
}
.drawer-bar:hover { background: var(--text-muted); }
.drawer-close {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; padding: 3px; font-size: 18px; line-height: 1;
  font-family: inherit;
}
.drawer-close:hover { color: var(--text-primary); }

.drawer-content {
  flex: 1; overflow-y: auto;
  padding: 14px 20px 20px;
  display: grid; grid-template-columns: 1.2fr 1.5fr 1fr;
  gap: 18px;
}
@media (max-width: 900px) { .drawer-content { grid-template-columns: 1fr 1fr; } }
@media (max-width: 600px) { .drawer-content { grid-template-columns: 1fr; } #drawer { height: 72vh; } }

.dsec h3 {
  font-size: 9px; letter-spacing: 0.13em;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 7px; font-weight: 700;
}
.drawer-title {
  font-family: var(--font-display); font-size: 20px;
  font-weight: 700; color: var(--text-primary);
  line-height: 1.2; margin-bottom: 3px;
}
[dir="rtl"] .drawer-title { font-family: var(--font-persian); }
.drawer-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
.drawer-desc { font-size: 12.5px; color: var(--text-secondary); line-height: 1.65; }
.iran-note {
  background: var(--iran-bg);
  border: 1px solid var(--iran-border);
  border-radius: var(--radius); padding: 9px 11px;
  font-size: 12px; color: var(--iran-accent); line-height: 1.5;
  margin-top: 10px;
}
.drawer-links { margin-top: 10px; }
.drawer-links a {
  display: block; font-size: 11px;
  color: var(--domestic); margin-bottom: 5px;
  word-break: break-word;
  text-decoration: none;
}
.drawer-links a:hover { text-decoration: underline; }

/* tradeoffs */
.tradeoff-grid { display: flex; flex-direction: column; gap: 7px; }
.tradeoff-row { display: flex; align-items: center; gap: 7px; }
.tradeoff-label { width: 120px; font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
.tradeoff-bar {
  flex: 1; height: 5px; background: var(--surface3);
  border-radius: 3px; overflow: hidden;
}
.tradeoff-fill { 
  height: 100%; border-radius: 3px; background: var(--crisis);
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1); 
}
/* .tradeoff-fill.tf-teal   { background: var(--speed-fast); }

.tradeoff-fill.tf-purple { background: var(--dual); }
.tradeoff-fill.tf-green  { background: var(--risk-low); } */
.tradeoff-val { width: 24px; font-size: 10px; color: var(--text-secondary); text-align: right; }
[dir="rtl"] .tradeoff-val { text-align: left; }

.tradeoff-info {
  font-size: 10px; color: var(--text-muted);
  margin-top: 8px; line-height: 1.5;
  border-top: 1px solid var(--border); padding-top: 8px;
}
.tradeoff-info a { color: var(--domestic); }

/* ======================================================
   TOOLTIP
   ====================================================== */
#tooltip {
  position: fixed; background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius); padding: 9px 13px;
  font-size: 12px; max-width: 220px;
  pointer-events: none; z-index: 400;
  box-shadow: var(--shadow); opacity: 0;
  transition: opacity 0.12s;
}
#tooltip.visible { opacity: 1; }
.tt-title { font-weight: 600; color: var(--text-primary); margin-bottom: 3px; font-size: 12px; }
.tt-desc { color: var(--text-secondary); line-height: 1.4; }
.tt-iran { font-size: 10px; color: var(--iran-accent); margin-top: 4px; }

/* ======================================================
   EMPTY CELL
   ====================================================== */
.empty-cell {
  color: var(--text-muted); font-size: 11px;
  padding: 8px; text-align: center; opacity: 0.3;
}

/* ======================================================

.overlay {

.overlay.active { display: block; }

/* ======================================================

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}
.action-node { animation: fadeUp 0.22s ease both; }

/* =====================================================
   HELPERS
   ===================================================== */
function t(k){ return T[S.lang][k] || k; }
function tObj(k,sub){ const o=T[S.lang][k]; return o?o[sub]:''; }
function aTitle(a){ return S.lang==='fa'?a.title_fa:a.title_en; }
function aDesc(a){ return S.lang==='fa'?a.description_fa:a.description_en; }
function aIran(a){ return S.lang==='fa'?a.iran_notes_fa:a.iran_notes_en; }
function actLbl(v){ return tObj('actorLabels',v)||v; }
function metLbl(v){ return tObj('methodLabels',v)||v; }
function spdLbl(v){ return tObj('speedLabels',v)||v; }
function rskLbl(v){ return tObj('riskLabels',v)||v; }

/* =====================================================
   FILTER LOGIC вҖ” cards fade, not removed
   ===================================================== */
function isVisible(a){
  if(!S.filters.target.includes(a.target)) return false;
  if(!S.filters.speed.includes(a.speed))   return false;
  if(a.risk > S.filters.maxRisk)           return false;
  if(!S.filters.actor.includes(a.actor))   return false;
  if(S.filters.loopStage){
    const rel = LOOP_STAGE_ACTIONS[S.filters.loopStage]||[];
    if(!rel.includes(a.id)) return false;
  }
  return true;
}
function countVisible(){ return ACTIONS.filter(isVisible).length; }

/* =====================================================
   GRID RENDER
   ===================================================== */
function renderGrid(){
  const vis = countVisible();
  document.getElementById('grid-stats').innerHTML = t('gridStats')(vis, ACTIONS.length);

  /*
  // legend
  document.getElementById('legend').innerHTML = `
    <div class="legend-item"><div class="legend-dot" style="background:var(--domestic)"></div>${t('legDomestic')}</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--international)"></div>${t('legIntl')}</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--dual)"></div>${t('legDual')}</div>
  `;
  */ 

  let html = '<thead><tr><th class="row-header"></th>';
  METHODS.forEach(m => { html += `<th>${metLbl(m)}</th>`; });
  html += '</tr></thead><tbody>';

  ACTORS.forEach(actor => {
    html += `<tr><td class="actor-label">${actLbl(actor)}</td>`;
    METHODS.forEach(method => {
      const cells = ACTIONS.filter(a => a.actor===actor && a.method===method);
      if(!cells.length){ html += `<td class="cell empty"><div class="empty-cell">${t('emptyCell')}</div></td>`; return; }
      html += `<td class="cell">`;
      cells.forEach((a,i) => {
        const visible    = isVisible(a);
        const iranHl     = S.iranMode && a.iran_relevance>=4;
        const selectedCl = S.selectedId===a.id ? 'selected' : '';
        const fadedCl    = !visible ? 'filtered-out' : '';
        const iranCl     = iranHl ? 'iran-highlight' : '';
        const spBadge    = `<span class="badge sp-${a.speed}">${spdLbl(a.speed)}</span>`;
        const rkBadge    = `<span class="badge rk-${a.risk}">${rskLbl(a.risk)}</span>`;
        const iranBadge  = iranHl ? `<span class="badge iran-badge">${a.iran_relevance===5?t('iranHighBadge'):t('iranBadge')}</span>` : '';
        html += `<div class="action-node target-${a.target} ${iranCl} ${selectedCl} ${fadedCl}"
          onclick="selectAction('${a.id}')"
          onmouseenter="showTip(event,'${a.id}')"
          onmouseleave="hideTip()"
          style="animation-delay:${i*35}ms">
          <div class="node-title">${aTitle(a)}</div>
          <div class="node-badges">${spBadge}${rkBadge}</div>
        </div>`;
      });
      html += `</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  document.getElementById('action-grid').innerHTML = html;
}

/* =====================================================
   FILTER CONTROLS
   ===================================================== */
function renderFilters(){
  // target
  document.getElementById('filter-target').innerHTML =
    ['domestic','international','dual'].map(v => {
      const act = S.filters.target.includes(v)?'active':'';
      const lbl = t({domestic:'legDomestic',international:'legIntl',dual:'legDual'}[v]);
      return `<button class="chip target-${v} ${act}" onclick="toggleF('target','${v}')">${lbl}</button>`;
    }).join('');

  // speed
  document.getElementById('filter-speed').innerHTML =
    ['fast','medium','slow'].map(v => {
      const act = S.filters.speed.includes(v)?'active':'';
      return `<button class="chip speed-${v} ${act}" onclick="toggleF('speed','${v}')">${spdLbl(v)}</button>`;
    }).join('');

  // risk chips (separate from slider)
  // actor
  document.getElementById('filter-actor').innerHTML =
    ACTORS.map(v => {
      const act = S.filters.actor.includes(v)?'active':'';
      return `<button class="chip actor-chip ${act}" onclick="toggleF('actor','${v}')">${actLbl(v)}</button>`;
    }).join('');

  document.getElementById('risk-slider').value = S.filters.maxRisk;
  updateRiskLabel();

  // labels
  ['target','speed','risk','actor'].forEach(k => {
    const el = document.getElementById(`lbl-${k}`);
    if(el) el.textContent = t(`lbl_${k}`);
  });
  document.getElementById('lbl-risk-low').textContent  = t('lbl_risk_low');
  document.getElementById('lbl-risk-high').textContent = t('lbl_risk_high');
  document.getElementById('reset-btn').textContent     = t('resetBtn');
  document.getElementById('filter-btn-label').textContent = t('filterBtnLabel');
}

function updateRiskLabel(){
  const v = parseInt(document.getElementById('risk-slider').value);
  const labels = {1:t('lbl_risk_low')+' (1)',2:'Medium (2)',3:t('lbl_risk_high')+' (3)'};
  const labelsFA = {1:'Ъ©Щ… (Ыұ)',2:'Щ…ШӘЩҲШіШ· (ЫІ)',3:'ШІЫҢШ§ШҜ (Ыі)'};
  document.getElementById('risk-current-label').textContent =
    S.lang==='fa' ? (labelsFA[v]||v) : (labels[v]||v);
}

function toggleF(type, value){
  const arr = S.filters[type];
  const idx = arr.indexOf(value);
  if(idx===-1) arr.push(value);
  else if(arr.length>1) arr.splice(idx,1);
  // re-render chips only for this type + grid
  renderFilters();
  renderGrid();
}

function onSlider(){
  S.filters.maxRisk = parseInt(document.getElementById('risk-slider').value);
  updateRiskLabel();
  renderGrid();
}

function resetFilters(){
  S.filters = {
    target:['domestic','international','dual'],
    speed:['fast','medium','slow'],
    maxRisk:3,
    actor:[...ACTORS],
    loopStage:null
  };
  renderFilters();
  renderLoopBar();
  renderGrid();
}

/* =====================================================
   LOOP BAR
   ===================================================== */
function renderLoopBar(){
  document.getElementById('loop-bar-label').textContent = t('loopBarLabel');
  const nodes = T[S.lang].loopNodes;
  let html='';
  nodes.forEach((n,i) => {
    const act = S.filters.loopStage===n.id?'active':'';
    html += `<div class="loop-node ${act}" onclick="toggleLoop('${n.id}')" title="${n.tooltip}">
      <div class="loop-dot"></div>${n.label}</div>`;
    if(i<nodes.length-1) html+=`<div class="loop-arrow">вҶ’</div>`;
  });
  html+=`<div class="loop-arrow" style="opacity:.5">вҶә</div>`;
  document.getElementById('loop-nodes').innerHTML=html;
}

function toggleLoop(id){
  S.filters.loopStage = S.filters.loopStage===id?null:id;
  renderLoopBar(); renderGrid();
}

/* =====================================================
   DRAWER
   ===================================================== */
function selectAction(id){
  S.selectedId = S.selectedId===id ? null : id;
  if(S.selectedId) openDrawer(id);
  else closeDrawer();
  renderGrid();
}

function openDrawer(id){
  const a = ACTIONS.find(x=>x.id===id);
  if(!a) return;

  const spVal = {fast:5,medium:3,slow:1}[a.speed];
  const bars = [
    {label:t('speedLbl'), val:spVal,                  max:5,  cls:'tf-teal'},
    {label:t('riskLbl'),  val:a.risk,                 max:3,  cls:'tf-red'},
    {label:t('scalLbl'),  val:a.scalability,          max:5,  cls:'tf-blue'},
    {label:t('revLbl'),   val:a.reversibility,        max:5,  cls:'tf-gold'},
    {label:t('resLbl'),   val:6-a.resources,          max:5,  cls:'tf-green'},
    {label:t('cultLbl'),  val:a.cultural_adaptability,max:5,  cls:'tf-purple'}
  ];

  const tc = {domestic:'var(--domestic)',international:'var(--international)',dual:'var(--dual)'}[a.target];
  const tn = t({domestic:'legDomestic',international:'legIntl',dual:'legDual'}[a.target]);
  const iranB = a.iran_relevance>=4
    ? `<span class="badge iran-badge">${a.iran_relevance===5?t('iranHighBadge'):t('iranBadge')}</span>` : '';

  const linksHtml = a.links && a.links.length
    ? `<div class="drawer-links">${a.links.map(l=>`<a href="${l.url}" target="_blank" rel="noopener">вҶ— ${l.label}</a>`).join('')}</div>`
    : '';

  document.getElementById('drawer-content').innerHTML = `
    <div class="dsec">
      <div class="drawer-title">${aTitle(a)}</div>
      <div class="drawer-meta">
        <span class="badge" style="background:var(--surface3);color:var(--text-secondary)">${actLbl(a.actor)}</span>
        <span class="badge" style="background:var(--surface3);color:var(--text-secondary)">${metLbl(a.method)}</span>
        <span class="badge" style="background:${tc}20;color:${tc}">${tn}</span>
        <span class="badge sp-${a.speed}">${spdLbl(a.speed)}</span>
        <span class="badge rk-${a.risk}">${rskLbl(a.risk)}</span>
        ${iranB}
      </div>
    </div>
    <div class="dsec">
      <h3>${t('drawerDesc')}</h3>
      <div class="drawer-desc">${aDesc(a)}</div>
      ${(S.iranMode||a.iran_relevance>=4)?`<div class="iran-note">${aIran(a)}</div>`:''}
      ${linksHtml}
    </div>
    <div class="dsec">
      <h3>${t('drawerTradeoffs')}</h3>
      <div class="tradeoff-grid">
        ${bars.map(b=>`
          <div class="tradeoff-row">
            <div class="tradeoff-label">${b.label}</div>
            <div class="tradeoff-bar"><div class="tradeoff-fill ${b.cls}" style="width:${(b.val/b.max)*100}%"></div></div>
            <div class="tradeoff-val">${b.val}/${b.max}</div>
          </div>`).join('')}
      </div>
      <div class="tradeoff-info">
        ${t('tradeoffNote')} <a href="#" onclick="switchTab('methodology');closeDrawer();return false;">${t('tradeoffNoteLink')}</a> ${t('tradeoffNoteEnd')}
      </div>
    </div>
  `;
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  S.selectedId=null;
  renderGrid();
}

/* =====================================================
   TOOLTIP
   ===================================================== */
function showTip(e,id){
  const a=ACTIONS.find(x=>x.id===id); if(!a) return;
  document.getElementById('tt-title').textContent = aTitle(a);
  document.getElementById('tt-desc').textContent  = aDesc(a).substring(0,90)+'вҖҰ';
  const ti = document.getElementById('tt-iran');
  if(a.iran_relevance>=4){ ti.textContent='в¬Ҙ '+t('iranBadge'); ti.style.display='block'; }
  else ti.style.display='none';
  const tt=document.getElementById('tooltip');
  const x=Math.min(e.clientX+14, window.innerWidth-230);
  const y=Math.min(e.clientY-8,  window.innerHeight-110);
  tt.style.left=x+'px'; tt.style.top=y+'px';
  tt.classList.add('visible');
}
function hideTip(){ document.getElementById('tooltip').classList.remove('visible'); }

/* =====================================================
   TAB SWITCHING
   ===================================================== */
function switchTab(tab){
  S.tab=tab;
  ['explorer','methodology'].forEach(id => {
    const page = document.getElementById(`page-${id}`);
    const btn  = document.getElementById(`tab-${id}`);
    if(id===tab){
      page.style.display = id==='explorer'?'flex':'block';
      page.classList.add('active');
      btn.classList.add('active');
    } else {
      page.style.display='none';
      page.classList.remove('active');
      btn.classList.remove('active');
    }
  });
  document.getElementById('loop-bar').style.display = tab==='explorer'?'block':'none';
  if(tab==='methodology') renderMethodology();
  // update tab labels for current language
  document.getElementById('tab-explorer').textContent    = S.lang==='fa'?'Ъ©Ш§ЩҲШҙЪҜШұ':'Explorer';
  document.getElementById('tab-methodology').textContent = S.lang==='fa'?'ШұЩҲШҙвҖҢШҙЩҶШ§ШіЫҢ':'Methodology';
}

/* =====================================================
   LANGUAGE
   ===================================================== */
function setLang(lang){
  S.lang=lang;
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==='fa'?'rtl':'ltr';
  document.getElementById('btn-en').classList.toggle('active',lang==='en');
  document.getElementById('btn-fa').classList.toggle('active',lang==='fa');
  renderAll();
}

/* =====================================================
   THEME
   ===================================================== */
function toggleTheme(){
  S.theme = S.theme==='dark'?'light':'dark';
  document.body.classList.toggle('light', S.theme==='light');
  document.getElementById('theme-btn').textContent = S.theme==='dark'?'рҹҢһ':'рҹҢ”';
}

/* =====================================================
   IRAN MODE
   ===================================================== */
function toggleIranMode(){
  S.iranMode=!S.iranMode;
  document.getElementById('iran-toggle-btn').classList.toggle('active',S.iranMode);
  renderGrid();
}

/* =====================================================
   MOBILE
   ===================================================== */
function toggleMobileSidebar(){
  document.getElementById('sidebar').classList.toggle('mobile-open');
  document.getElementById('overlay').classList.toggle('active');
}

/* =====================================================
   HEADER TEXT
   ===================================================== */
function renderHeader(){
  document.getElementById('main-title').textContent  = t('mainTitle');
  document.getElementById('sub-title').textContent   = t('subTitle');
  document.getElementById('iran-label').textContent  = t('iranLabel');
  document.getElementById('tab-explorer').textContent    = S.lang==='fa'?'Ъ©Ш§ЩҲШҙЪҜШұ':'Explorer';
  document.getElementById('tab-methodology').textContent = S.lang==='fa'?'ШұЩҲШҙвҖҢШҙЩҶШ§ШіЫҢ':'Methodology';
}

/* =====================================================
   RENDER ALL
   ===================================================== */
function renderAll(){
  renderHeader();
  renderLoopBar();
  renderFilters();
  renderGrid();
  if(S.tab==='methodology') renderMethodology();
}

/* =====================================================
   INIT
   ===================================================== */
renderAll();
